  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bounce-primary: #FF6B35; --bounce-dark: #0D0D0D; --bounce-card: #161616;
    --bounce-border: #2a2a2a; --bounce-text: #F0EDE8; --bounce-muted: #888;
    --bounce-green: #2ECC71; --bounce-amber: #F39C12; --bounce-red: #E74C3C;
    --bounce-blue: #3498DB; --bounce-purple: #9B59B6;
    --app-bg: #F7F5F2; --app-card: #FFFFFF; --app-text: #1A1A1A;
    --app-muted: #888; --app-border: #E8E4DF;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bounce-dark); color: var(--bounce-text); }
  .app-root { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .view-toggle { display: flex; background: #111; border-bottom: 1px solid var(--bounce-border); padding: 8px 16px; gap: 8px; z-index: 100; }
  .view-btn { flex: 1; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--bounce-border); background: transparent; color: var(--bounce-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .view-btn.active { background: var(--bounce-primary); color: white; border-color: var(--bounce-primary); }
  .dashboard { display: flex; flex: 1; overflow: hidden; background: var(--bounce-dark); }
